<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramadhan Kareem</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <header>
        <div class="header-ornament">
            <i class="bi bi-moon-stars-fill"></i>
        </div>
        <h1>Ramadhan Kareem</h1>
    </header>

    <nav class="nav-tabs">
        <a href="index.html" class="tab-link">
            <i class="bi bi-clock-fill"></i> <span>Imsakiyah</span>
        </a> 
        <a href="doa.html#doa-ramadhan">
            <i class="bi bi-moon-stars-fill"></i> <span>doa</span>
        </a>
        <a href="zikir.html">
            <i class="bi bi-book-fill"></i> <span>Zikir</span>
        </a>
        <a href="zakat.html">
            <i class="bi bi-calculator"></i> <span>Zakat</span>
        </a>
        <a href="todolist.html" class="tab-link">
            <i class="bi bi-check2-square"></i> <span>To Do List</span>
        </a>    
    </nav>

    <main>
        <div class="card selector-card">
            <div class="selection-row">
                <div class="input-group flex-1">
                    <label class="input-label"><i class="bi bi-geo-alt-fill"></i> Pilih Kota</label>
                    <select id="citySelect" class="input-field" style="cursor: pointer;">
                        <option value="">Memuat daftar kota...</option>
                    </select>
                </div>

                <div class="input-group flex-1" style="position: relative;">
                    <label class="input-label"><i class="bi bi-search"></i> Cari Kota</label>
                    <input type="text" id="citySearch" class="input-field" placeholder="Ketik nama kota..." autocomplete="off">
                    
                    <div id="searchSuggestions" class="search-results d-none"></div>
                </div>
            </div>
        </div>

        <div id="statusArea" class="status-container">
            <div id="loadingMsg" class="loading-spinner d-none">
                <div class="spinner"></div>
                <p>Memuat data jadwal...</p>
            </div>
            <div id="errorMsg" class="error-box d-none">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <p>Gagal memuat data. Periksa koneksi internet Anda.</p>
            </div>
        </div>

        <div class="table-responsive card">
            <table id="imsakiyahTable">
                <thead>
                    <tr>
                        <th>Tanggal</th>
                        <th>Imsak</th>
                        <th>Subuh</th>
                        <th>Dzuhur</th>
                        <th>Ashar</th>
                        <th>Maghrib</th>
                        <th>Isya</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>
    </main>

    <footer>
        <p>Ramadhan Kareem - Semoga ibadah puasa kita diterima Allah SWT.</p>
    </footer>

    <script src="index.js"></script>
</body>
</html>
