<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hitung Zikir - Ramadhan Bless</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Lora&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <header>
        <div class="header-ornament">
            <i class="bi bi-moon-stars-fill"></i>
        </div>
        <h1>Ramadhan Kareem</h1>
    </header>

    <nav class="nav-tabs">
        <a href="index.html#doa-ramadhan">
            <i class="bi bi-moon-stars-fill"></i> <span>Niat sahur & doa berbuka puasa</span>
        </a>
        <a href="zikir.html">
            <i class="bi bi-book-fill"></i> <span>Zikir</span>
        </a>
        <a href="zakat.html">
            <i class="bi bi-calculator"></i> <span>Zakat</span>
        </a>
    </nav>

    <main>
        <section class="zikir-section">
            <div class="counter-container">
                <div class="target-selector">
                    <span>Set Target:</span>
                    <button class="btn-target active" onclick="setTarget(33)">33</button>
                    <button class="btn-target" onclick="setTarget(100)">100</button>
                </div>

                <p class="target-label">Target saat ini: <span id="target-value">33</span></p> 

                <div class="counter-display">
                    <span id="zikir-count">0</span>
                </div>

                <div class="zikir-controls">
                    <button id="btn-tambah" class="btn-zikir tambah">Tambah +</button>
                    <button id="btn-reset" class="btn-zikir reset">Reset</button>
                </div>

                <div id="notification" class="notification"></div>
            </div>
        </section>
    </main>

    <footer>
        <p>Ramadhan Kareem - Semoga ibadah puasa kita diterima Allah SWT.</p>
    </footer>

    <script src="zikir.js"></script>
</body>
</html>
