<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ramadhan Kareem</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet" /> 
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <header>
        <div class="header-ornament">
            <i class="bi bi-moon-stars-fill"></i>
        </div>
        <h1>Ramadhan Kareem</h1>
    </header>

    <nav class="nav-tabs">
        <a href="index.html#doa-ramadhan">
            <i class="bi bi-moon-stars-fill"></i> <span>doa</span>
        </a>
        <a href="zikir.html">
            <i class="bi bi-book-fill"></i> <span>Zikir</span>
        </a>
        <a href="zakat.html">
            <i class="bi bi-calculator"></i> <span>Zakat</span>
        </a>
                <a href="todolist.html" class="tab-link">
            <i class="bi bi-check2-square"></i> <span>To Do List</span>
        </a>
    </nav>

    <main>
        <section class="zakat-card">
            <h2>Hitung Zakat Anda</h2>
            
            <div class="form-input">
                <label for="zakat-type">Jenis Zakat</label>
                <select id="zakat-type">
                    <option value="penghasilan">Zakat Penghasilan</option>
                    <option value="emas">Zakat Emas</option>
                </select>
            </div>

            <div class="form-input">
                <label for="harga-emas">Harga Emas Saat Ini (per gram)</label>
                <input type="number" id="harga-emas" placeholder="Masukkan harga emas">
            </div>

            <div id="form-penghasilan">
                <div class="form-input">
                    <label for="gaji">Gaji Bulanan (Rp)</label>
                    <input type="number" id="gaji" placeholder="0">
                </div>
                <div class="form-input">
                    <label for="lainnya">Penghasilan Lain (Rp)</label>
                    <input type="number" id="lainnya" placeholder="0">
                </div>
            </div>

            <div id="form-emas" style="display: none;">
                <div class="form-input">
                    <label for="total-emas">Total Emas (gram)</label>
                    <input type="number" id="total-emas" placeholder="0">
                </div>
            </div>

            <button id="btn-hitung">Hitung Zakat</button>
            <button id="btn-reset-zakat" class="btn-reset-zakat">Reset Form</button>

            <div id="result-box" class="result-box" style="display: none;">
                <h3>Hasil Perhitungan</h3>
                <div class="result">
                    <span>Total Harta:</span>
                    <strong id="res-total">Rp 0</strong>
                </div>
                <div class="result">
                    <span>Nilai Nisab (85g Emas):</span>
                    <strong id="res-nisab">Rp 0</strong>
                </div>
                <div class="result">
                    <span>Status:</span>
                    <strong id="res-status">-</strong>
                </div>
                <div class="result zakat-amount">
                    <span>Zakat yang Harus Dibayar:</span>
                    <strong id="res-zakat">Rp 0</strong>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>Ramadhan Kareem - Semoga ibadah puasa kita diterima Allah SWT.</p>
    </footer>

    <script src="zakat.js"></script>
</body>
</html>
